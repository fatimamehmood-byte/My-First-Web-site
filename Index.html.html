<!DOCTYPE html>
<html>

<head>
    <title>My First Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        th {
            background-color: #007BFF;
            color: white;
            font-size: 32px;
            padding: 20px;
        }

        td {
            border: 1px solid #ddd;
            padding: 15px;
        }

        h2 {
            color: #007BFF;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #444;
        }

        ul {
            font-size: 18px;
        }

        a {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: red;
        }

        img {
            display: block;
            margin: auto;
            border-radius: 10px;
            border: 3px solid #007BFF;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .center {
            text-align: center;
        }
    </style>

</head>

<body>

    <table>
        <tr>
            <th colspan="2">Welcome to My Website</th>
        </tr>

        <tr>
            <td><strong>Name</strong></td>
            <td>Fatima</td>
        </tr>

        <tr>
            <td><strong>Introduction</strong></td>
            <td>
                <p>Hello! My name is Fatima.</p>
                <p>I am learning HTML.</p>
            </td>
        </tr>

        <tr>
            <td><strong>About Me</strong></td>
            <td>I am a student.</td>
        </tr>

        <tr>
            <td><strong>My Hobbies</strong></td>
            <td>
                <ul>
                    <li>Reading</li>
                    <li>Playing Games</li>
                    <li>Watching Movies</li>
                </ul>
            </td>
        </tr>

        <tr>
            <td><strong>Favorite Website</strong></td>
            <td>
                <a href="https://www.google.com" target="_blank">Visit Google</a>
            </td>
        </tr>

        <tr>
            <td><strong>Sample Image</strong></td>
            <td class="center">
                <img src="https://via.placeholder.com/200" alt="Sample Image">
            </td>
        </tr>

        <tr>
            <td colspan="2" class="center">
                <button>Click Me</button>
            </td>
        </tr>
    </table>

</body>

</html>
